<!DOCTYPE html>
<html lang="pt-BR" data-theme="terra" data-font="nunito">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vínculos - Diário Pessoal</title>
    
    <!-- Importando mais opções de fontes do Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;600;700;800&family=Poppins:wght@400;500;600&family=Quicksand:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* --- Variáveis Base & Cores (Temas) --- */
        :root {
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
            
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.03);
            
            --danger: #FF6B6B;
            --danger-light: #FFE5E5;
            
            /* Tema Padrão: Terra */
            --bg: #FAF6F0;
            --surface: #FFFFFF;
            --primary: #8C7A6B;
            --primary-light: #E8E0D5;
            --text-main: #4A4036;
            --text-muted: #8C7A6B;
            --border: #E8E0D5;
        }

        /* Tema: Oceano */
        [data-theme="oceano"] {
            --bg: #F0F6FA; --surface: #FFFFFF; --primary: #5A8296;
            --primary-light: #D5E2E8; --text-main: #2A3F4A;
            --text-muted: #6B8C9E; --border: #D5E0E8;
        }

        /* Tema: Lavanda */
        [data-theme="lavanda"] {
            --bg: #F8F0FA; --surface: #FFFFFF; --primary: #835A96;
            --primary-light: #E2D5E8; --text-main: #3F2A4A;
            --text-muted: #8C6B9E; --border: #E0D5E8;
        }

        /* Tema: Floresta */
        [data-theme="floresta"] {
            --bg: #F0FAF2; --surface: #FFFFFF; --primary: #5A966E;
            --primary-light: #D5E8DD; --text-main: #2A4A34;
            --text-muted: #6B9E82; --border: #D5E8D9;
        }

        /* Tema: Noite (Dark Mode) */
        [data-theme="noite"] {
            --bg: #1A1A24; --surface: #2A2A36; --primary: #8C9EBB;
            --primary-light: #3A4A6B; --text-main: #F0F0F0;
            --text-muted: #8C9EBB; --border: #3A3A4A;
        }

        /* --- Tipografia (Fontes) --- */
        [data-font="nunito"] { font-family: 'Nunito', sans-serif; }
        [data-font="lora"] { font-family: 'Lora', serif; }
        [data-font="poppins"] { font-family: 'Poppins', sans-serif; }
        [data-font="quicksand"] { font-family: 'Quicksand', sans-serif; }
        [data-font="playfair"] { font-family: 'Playfair Display', serif; }
        [data-font="mono"] { font-family: 'Roboto Mono', monospace; }

        /* --- Reset & Base --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
            padding-bottom: 110px; /* Espaço para a navbar mais alta */
            min-height: 100vh;
        }

        h1, h2, h3 { font-weight: 700; margin-bottom: 15px; }
        p { line-height: 1.6; }

        /* --- Layout --- */
        .container {
            padding: 24px 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 { margin: 0; font-size: 24px; }

        /* --- Componentes --- */
        .card {
            background: var(--surface);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .insight-card {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            background: var(--primary-light);
            border: none;
            color: var(--text-main);
        }

        .insight-icon {
            font-size: 28px;
            line-height: 1;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary { background: var(--primary); color: #FFF; width: 100%; }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
        
        .btn-icon {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover, .btn-icon:active {
            background: var(--primary-light);
            color: var(--primary);
        }

        .btn-danger { color: var(--danger); }
        .btn-danger:hover { background: var(--danger-light); }

        /* --- Formulários --- */
        .input-group { margin-bottom: 16px; }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-muted);
        }

        .input-field {
            width: 100%;
            padding: 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-main);
            font-family: inherit;
            font-size: 16px; /* Previne zoom no iOS */
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus { border-color: var(--primary); }

        /* Sliders */
        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: var(--border);
            outline: none;
            margin: 10px 0 20px 0;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }

        /* --- Views (Abas) --- */
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Navegação Inferior (Mais Alta e Adaptada) --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90px; /* Mais alta */
            background: var(--surface);
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            padding-bottom: env(safe-area-inset-bottom); /* Área segura do iPhone */
            border-top-left-radius: var(--radius-lg);
            border-top-right-radius: var(--radius-lg);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 700;
            padding: 10px 20px;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: all 0.2s;
            font-family: inherit;
        }

        .nav-item.active {
            color: var(--primary);
            background: var(--primary-light);
            transform: translateY(-5px);
        }

        .nav-icon { font-size: 26px; }

        /* --- Modais --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: flex-end; /* Abre por baixo no mobile */
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }

        .modal-content {
            background: var(--surface);
            width: 100%;
            max-width: 600px;
            border-top-left-radius: var(--radius-lg);
            border-top-right-radius: var(--radius-lg);
            padding: 30px 24px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }

        /* Modal Centralizado para Confirmação */
        .modal-center { align-items: center; padding: 20px; }
        .modal-center .modal-content {
            border-radius: var(--radius-lg);
            transform: scale(0.9);
        }
        .modal-overlay.active .modal-center .modal-content { transform: scale(1); }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .modal-actions .btn { flex: 1; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }

        /* --- Específicos do Diário e Pessoas --- */
        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .item-date { font-size: 14px; color: var(--text-muted); font-weight: 600; }
        .item-text { white-space: pre-wrap; font-size: 16px; }
        
        .person-metrics { display: flex; gap: 15px; margin-top: 10px; font-size: 14px;}
        .metric-badge {
            background: var(--bg);
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* --- Estilização (Configurações) --- */
        .grid-options {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .option-btn {
            padding: 15px 10px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: var(--bg);
            cursor: pointer;
            font-weight: 600;
            text-align: center;
            transition: all 0.2s;
            color: var(--text-main);
        }
        .option-btn.selected { border-color: var(--primary); background: var(--primary-light); }
        
    </style>
</head>
<body>

    <div class="container">
        <!-- HEADER PRINCIPAL -->
        <header class="header">
            <h1 id="view-title">Início</h1>
            <button class="btn-icon" onclick="app.openModal('settings')" aria-label="Personalizar Estilo">🎨</button>
        </header>

        <!-- VIEW: INÍCIO (Insights) -->
        <div id="view-home" class="view active">
            <p style="color: var(--text-muted); margin-bottom: 20px;">Seus insights diários baseados nas suas conexões e pensamentos.</p>
            <div id="insights-container">
                <!-- Insights injetados via JS -->
            </div>
        </div>

        <!-- VIEW: PESSOAS -->
        <div id="view-people" class="view">
            <button class="btn btn-primary" style="margin-bottom: 24px;" onclick="app.openModal('person')">
                <span>➕</span> Adicionar Pessoa
            </button>
            <div id="people-container">
                <!-- Pessoas injetadas via JS -->
            </div>
        </div>

        <!-- VIEW: MIM (Diário) -->
        <div id="view-me" class="view">
            <button class="btn btn-primary" style="margin-bottom: 24px;" onclick="app.openModal('diary')">
                <span>✍️</span> Escrever no Diário
            </button>
            <div id="diary-container">
                <!-- Registros injetados via JS -->
            </div>
        </div>
    </div>

    <!-- NAVEGAÇÃO INFERIOR -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="app.switchView('home')" id="nav-home">
            <span class="nav-icon">🪴</span>
            <span>Início</span>
        </button>
        <button class="nav-item" onclick="app.switchView('people')" id="nav-people">
            <span class="nav-icon">👥</span>
            <span>Pessoas</span>
        </button>
        <button class="nav-item" onclick="app.switchView('me')" id="nav-me">
            <span class="nav-icon">📖</span>
            <span>Mim</span>
        </button>
    </nav>

    <!-- MODAL: NOVA PESSOA -->
    <div id="modal-person" class="modal-overlay">
        <div class="modal-content">
            <h3>Nova Conexão</h3>
            
            <div class="input-group">
                <label>Nome ou Apelido</label>
                <input type="text" id="person-name" class="input-field" placeholder="Ex: Maria, Mãe, João...">
            </div>
            
            <div class="input-group">
                <label>Nível de Proximidade: <span id="val-closeness">5</span>/10</label>
                <input type="range" id="person-closeness" min="1" max="10" value="5" class="slider" oninput="document.getElementById('val-closeness').innerText=this.value">
            </div>
            
            <div class="input-group">
                <label>Nível de Confiança: <span id="val-trust">5</span>/10</label>
                <input type="range" id="person-trust" min="1" max="10" value="5" class="slider" oninput="document.getElementById('val-trust').innerText=this.value">
            </div>

            <div class="modal-actions">
                <button class="btn btn-outline" onclick="app.closeModal('person')">Cancelar</button>
                <button class="btn btn-primary" onclick="app.savePerson()">Salvar</button>
            </div>
        </div>
    </div>

    <!-- MODAL: NOVO REGISTRO NO DIÁRIO -->
    <div id="modal-diary" class="modal-overlay">
        <div class="modal-content">
            <h3>Meu Diário</h3>
            
            <div class="input-group">
                <label>Data do Registro</label>
                <!-- Escolha de data para permitir registros retroativos -->
                <input type="date" id="diary-date" class="input-field">
            </div>

            <div class="input-group">
                <label>O que está na sua mente?</label>
                <textarea id="diary-text" class="input-field" rows="6" placeholder="Escreva sobre seus sentimentos, pensamentos ou acontecimentos..."></textarea>
            </div>

            <div class="modal-actions">
                <button class="btn btn-outline" onclick="app.closeModal('diary')">Cancelar</button>
                <button class="btn btn-primary" onclick="app.saveDiary()">Salvar</button>
            </div>
        </div>
    </div>

    <!-- MODAL: ESTILO E PERSONALIZAÇÃO -->
    <div id="modal-settings" class="modal-overlay">
        <div class="modal-content">
            <h3>Personalizar Vínculos</h3>
            
            <div class="input-group">
                <label>Temas de Cores</label>
                <div class="grid-options" id="theme-options">
                    <button class="option-btn" onclick="app.setTheme('terra')">Terra</button>
                    <button class="option-btn" onclick="app.setTheme('oceano')">Oceano</button>
                    <button class="option-btn" onclick="app.setTheme('lavanda')">Lavanda</button>
                    <button class="option-btn" onclick="app.setTheme('floresta')">Floresta</button>
                    <button class="option-btn" onclick="app.setTheme('noite')">Noite</button>
                </div>
            </div>

            <div class="input-group">
                <label>Estilo de Fonte</label>
                <div class="grid-options" id="font-options">
                    <button class="option-btn" style="font-family: 'Nunito'" onclick="app.setFont('nunito')">Nunito</button>
                    <button class="option-btn" style="font-family: 'Lora'" onclick="app.setFont('lora')">Lora</button>
                    <button class="option-btn" style="font-family: 'Poppins'" onclick="app.setFont('poppins')">Poppins</button>
                    <button class="option-btn" style="font-family: 'Quicksand'" onclick="app.setFont('quicksand')">Quicksand</button>
                    <button class="option-btn" style="font-family: 'Playfair Display'" onclick="app.setFont('playfair')">Playfair</button>
                    <button class="option-btn" style="font-family: 'Roboto Mono'" onclick="app.setFont('mono')">Mono</button>
                </div>
            </div>

            <button class="btn btn-primary" style="margin-top: 10px;" onclick="app.closeModal('settings')">Pronto</button>
        </div>
    </div>

    <!-- MODAL: CONFIRMAÇÃO DE EXCLUSÃO (Mensagem Box customizada ao invés de alert) -->
    <div id="modal-confirm" class="modal-overlay modal-center">
        <div class="modal-content" style="padding-bottom: 24px;">
            <h3>Atenção</h3>
            <p id="confirm-message" style="margin-top: 10px;">Tem certeza que deseja apagar?</p>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="app.closeModal('confirm')">Cancelar</button>
                <button class="btn btn-primary btn-danger" id="confirm-btn">Sim, apagar</button>
            </div>
        </div>
    </div>

    <script>
        class VinculosApp {
            constructor() {
                // Carrega dados ou inicializa estrutura base
                const savedData = localStorage.getItem('vinculos_data');
                this.data = savedData ? JSON.parse(savedData) : {
                    people: [],
                    diary: [],
                    settings: { theme: 'terra', font: 'nunito' }
                };

                // Helper para formatador de datas local
                this.dateFormatter = new Intl.DateTimeFormat('pt-BR', { 
                    day: '2-digit', month: 'long', year: 'numeric' 
                });

                this.init();
            }

            init() {
                this.applySettings();
                this.setDefaultDate();
                this.renderAll();
            }

            save() {
                localStorage.setItem('vinculos_data', JSON.stringify(this.data));
            }

            // --- NAVEGAÇÃO E UI ---
            
            switchView(viewName) {
                // Oculta todas
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

                // Mostra a selecionada
                document.getElementById(`view-${viewName}`).classList.add('active');
                document.getElementById(`nav-${viewName}`).classList.add('active');

                // Atualiza Título
                const titles = { 'home': 'Início', 'people': 'Suas Conexões', 'me': 'Seu Diário' };
                document.getElementById('view-title').innerText = titles[viewName];
            }

            openModal(modalId) {
                if (modalId === 'diary') this.setDefaultDate();
                document.getElementById(`modal-${modalId}`).classList.add('active');
            }

            closeModal(modalId) {
                document.getElementById(`modal-${modalId}`).classList.remove('active');
            }

            confirmAction(message, onConfirm) {
                document.getElementById('confirm-message').innerText = message;
                const btn = document.getElementById('confirm-btn');
                
                // Remove listeners anteriores criando um clone do botão
                const newBtn = btn.cloneNode(true);
                btn.parentNode.replaceChild(newBtn, btn);
                
                newBtn.addEventListener('click', () => {
                    onConfirm();
                    this.closeModal('confirm');
                });

                this.openModal('confirm');
            }

            // --- ESTILO E CONFIGURAÇÕES ---

            applySettings() {
                document.documentElement.setAttribute('data-theme', this.data.settings.theme);
                document.documentElement.setAttribute('data-font', this.data.settings.font);
                this.updateSettingsUI();
            }

            setTheme(themeName) {
                this.data.settings.theme = themeName;
                this.save();
                this.applySettings();
            }

            setFont(fontName) {
                this.data.settings.font = fontName;
                this.save();
                this.applySettings();
            }

            updateSettingsUI() {
                // Atualiza visual dos botões de tema
                document.querySelectorAll('#theme-options .option-btn').forEach(btn => {
                    const theme = btn.getAttribute('onclick').match(/'([^']+)'/)[1];
                    btn.classList.toggle('selected', theme === this.data.settings.theme);
                });
                
                // Atualiza visual dos botões de fonte
                document.querySelectorAll('#font-options .option-btn').forEach(btn => {
                    const font = btn.getAttribute('onclick').match(/'([^']+)'/)[1];
                    btn.classList.toggle('selected', font === this.data.settings.font);
                });
            }

            // --- DIÁRIO ---

            setDefaultDate() {
                const dateInput = document.getElementById('diary-date');
                if (dateInput) {
                    // Define a data de hoje como padrão para o input date
                    const today = new Date();
                    const localISOTime = (new Date(today.getTime() - today.getTimezoneOffset() * 60000)).toISOString().slice(0, 10);
                    dateInput.value = localISOTime;
                }
            }

            saveDiary() {
                const text = document.getElementById('diary-text').value;
                const dateVal = document.getElementById('diary-date').value;

                if (!text.trim()) {
                    // Feedback visual se vazio (evitando alert)
                    document.getElementById('diary-text').style.borderColor = 'var(--danger)';
                    setTimeout(() => document.getElementById('diary-text').style.borderColor = '', 2000);
                    return;
                }

                // Corrige timezone na hora de salvar
                const [year, month, day] = dateVal.split('-');
                const entryDate = new Date(year, month - 1, day).toISOString();

                this.data.diary.push({
                    id: crypto.randomUUID(),
                    text: text,
                    date: entryDate,
                    timestamp: new Date().getTime()
                });

                // Ordena do mais recente para o mais antigo
                this.data.diary.sort((a, b) => new Date(b.date) - new Date(a.date));

                this.save();
                this.closeModal('diary');
                document.getElementById('diary-text').value = '';
                
                this.renderAll();
            }

            deleteDiary(id) {
                this.confirmAction("Tem certeza que deseja apagar esta página do diário? Essa ação não pode ser desfeita.", () => {
                    this.data.diary = this.data.diary.filter(d => d.id !== id);
                    this.save();
                    this.renderAll();
                });
            }

            renderDiary() {
                const container = document.getElementById('diary-container');
                container.innerHTML = '';

                if (this.data.diary.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color: var(--text-muted); margin-top: 40px;">Seu diário está em branco. Comece a escrever!</p>';
                    return;
                }

                this.data.diary.forEach(entry => {
                    const el = document.createElement('div');
                    el.className = 'card';
                    
                    const dateObj = new Date(entry.date);
                    const formattedDate = this.dateFormatter.format(dateObj);

                    el.innerHTML = `
                        <div class="item-header">
                            <span class="item-date">${formattedDate}</span>
                            <button class="btn-icon btn-danger" onclick="app.deleteDiary('${entry.id}')" aria-label="Apagar">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                        <div class="item-text">${entry.text}</div>
                    `;
                    container.appendChild(el);
                });
            }

            // --- PESSOAS ---

            savePerson() {
                const name = document.getElementById('person-name').value;
                const closeness = parseInt(document.getElementById('person-closeness').value);
                const trust = parseInt(document.getElementById('person-trust').value);

                if (!name.trim()) {
                    document.getElementById('person-name').style.borderColor = 'var(--danger)';
                    setTimeout(() => document.getElementById('person-name').style.borderColor = '', 2000);
                    return;
                }

                this.data.people.push({
                    id: crypto.randomUUID(),
                    name: name,
                    metrics: { closeness, trust }
                });

                this.save();
                this.closeModal('person');
                document.getElementById('person-name').value = '';
                document.getElementById('person-closeness').value = 5;
                document.getElementById('person-trust').value = 5;
                document.getElementById('val-closeness').innerText = 5;
                document.getElementById('val-trust').innerText = 5;
                
                this.renderAll();
            }

            deletePerson(id) {
                this.confirmAction("Tem certeza que deseja remover esta pessoa dos seus vínculos?", () => {
                    this.data.people = this.data.people.filter(p => p.id !== id);
                    this.save();
                    this.renderAll();
                });
            }

            renderPeople() {
                const container = document.getElementById('people-container');
                container.innerHTML = '';

                if (this.data.people.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color: var(--text-muted); margin-top: 40px;">Você ainda não adicionou conexões. Registre as pessoas importantes para você.</p>';
                    return;
                }

                this.data.people.forEach(person => {
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.innerHTML = `
                        <div class="item-header">
                            <h3 style="margin:0;">${person.name}</h3>
                            <button class="btn-icon btn-danger" onclick="app.deletePerson('${person.id}')" aria-label="Apagar">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                        <div class="person-metrics">
                            <div class="metric-badge">
                                <span>🫂</span> Prox: ${person.metrics.closeness}/10
                            </div>
                            <div class="metric-badge">
                                <span>🤝</span> Conf: ${person.metrics.trust}/10
                            </div>
                        </div>
                    `;
                    container.appendChild(el);
                });
            }

            // --- INSIGHTS (A BASE ORIGINAL INTACTA, MAS ADAPTADA AO DESIGN) ---

            renderInsights() {
                const container = document.getElementById('insights-container');
                container.innerHTML = '';
                let insights = [];

                // Lógica da Base Original
                if (this.data.diary.length === 0) {
                    insights.push({ icon: '📝', text: `Você ainda não escreveu sobre si. Seus pensamentos sentem falta de serem ouvidos.` });
                }

                let hasTension = false;
                this.data.people.forEach(p => {
                    if(p.metrics.closeness <= 3 && p.metrics.trust <= 4) {
                        hasTension = true;
                    }
                });

                if (hasTension) {
                    insights.push({ icon: '🌧️', text: `Notei que algumas das suas relações estão com pontuações baixas. Avalie se essas conexões ainda te fazem bem ou se é hora de impor limites.` });
                } else if (this.data.people.length > 0) {
                    insights.push({ icon: '💖', text: `O termômetro das suas relações parece estável. Que bom ter pessoas em quem confiar.` });
                }

                if (insights.length === 0) {
                    insights.push({ icon: '🪴', text: `Bem-vindo(a) ao Vínculos. Este é seu espaço seguro para cultivar relações saudáveis consigo e com os outros.` });
                }

                // Renderiza na tela
                insights.slice(0, 3).forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'card insight-card';
                    el.innerHTML = `
                        <div class="insight-icon">${item.icon}</div>
                        <div>${item.text}</div>
                    `;
                    container.appendChild(el);
                });
            }

            renderAll() {
                this.renderDiary();
                this.renderPeople();
                this.renderInsights();
            }
        }

        // Inicia a Aplicação
        const app = new VinculosApp();
    </script>
</body>
</html>
